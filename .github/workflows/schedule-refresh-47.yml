name: Schedule Refresh 47

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Restart central refresh if idle
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          active_runs="$(gh run list --workflow refresh.yml --limit 20 --json status --jq '[.[] | select(.status == "queued" or .status == "in_progress")] | length')"
          if [ "$active_runs" -eq 0 ]; then
            gh workflow run refresh.yml --repo "$GITHUB_REPOSITORY" --ref "$DEFAULT_BRANCH"
          else
            echo "Refresh chain is active"
          fi
