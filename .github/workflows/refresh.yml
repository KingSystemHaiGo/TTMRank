name: Refresh Data

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: data-publish
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # A queued run may start after an earlier refresh advances main.
          # Always collect from the latest default-branch snapshot.
          ref: ${{ github.event.repository.default_branch }}
          # Code comes from Git; generated snapshots are deployed as artifacts.
          fetch-depth: 2

      - name: Record artifact source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify committed visual engines
        run: |
          test -s app/js/dist/home-app.js
          test -s app/js/dist/changes-app.js
          test -s app/js/dist/universe-app.js
          test -s app/js/dist/rankings-app.js
          test -s app/js/dist/analysis-app.js
          test -s app/js/vendor/universe-three.js
          test -s app/js/vendor/change-map-pixi.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore rolling change state
        uses: actions/cache/restore@v4
        with:
          path: .ttmrank/change-state.json
          key: ttmrank-change-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ttmrank-change-state-

      - name: Restore rolling heat history
        uses: actions/cache/restore@v4
        with:
          path: .ttmrank/heat-history.json
          key: ttmrank-heat-history-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ttmrank-heat-history-

      - name: Run fetcher
        run: python app/fetcher.py
        env:
          PYTHONIOENCODING: utf-8
          TTMRANK_HISTORY_URL: ${{ secrets.TTMRANK_HISTORY_URL }}
          TTMRANK_HISTORY_TOKEN: ${{ secrets.TTMRANK_HISTORY_TOKEN }}
          TTMRANK_CHANGE_STATE_PATH: .ttmrank/change-state.json
          TTMRANK_HEAT_HISTORY_PATH: .ttmrank/heat-history.json

      - name: Validate generated data
        run: |
          PYTHONPATH=src python -m unittest tests.test_changes tests.test_change_state tests.test_history_client tests.test_pipeline tests.test_validators -v
          python -m json.tool app/data/v2/analysis-current.json >/dev/null
          python -m json.tool app/data/v2/analysis-made-current.json >/dev/null
          python -m json.tool app/data/v2/changes-current.json >/dev/null
          python -m json.tool app/data/v2/visual-current.json >/dev/null
          python -m json.tool app/data/v2/manifest.json >/dev/null
          python -m json.tool app/data/v2/quality.json >/dev/null
          python -m json.tool .ttmrank/change-state.json >/dev/null
          python -m json.tool .ttmrank/heat-history.json >/dev/null

      - name: Build single-document Pages site
        run: node scripts/build-site.mjs

      - name: Validate optimized site artifacts
        run: node --test tests/site/*.test.js

      - name: Save validated rolling change state
        uses: actions/cache/save@v4
        with:
          path: .ttmrank/change-state.json
          key: ttmrank-change-state-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Save validated rolling heat history
        uses: actions/cache/save@v4
        with:
          path: .ttmrank/heat-history.json
          key: ttmrank-heat-history-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Write refresh summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          manifest = json.loads(Path('app/data/v2/manifest.json').read_text(encoding='utf-8'))
          quality = json.loads(Path('app/data/v2/quality.json').read_text(encoding='utf-8'))
          history_ingest = manifest.get('history_ingest', {})
          changes_archive = manifest.get('changes_archive', {})
          print('## TTMRank refresh')
          print(f"- Games: {manifest['game_count']}")
          print(f"- Appearances: {manifest['appearance_count']}")
          print(f"- Quality warnings: {len(quality.get('issues', []))}")
          print(f"- Analysis JSON: {manifest['analysis_bytes']:,} bytes ({manifest['analysis_gzip_bytes']:,} gzip)")
          print(f"- Hourly history baselines: {'available' if manifest.get('history_available') else 'unavailable / graceful fallback'}")
          print(f"- Current history ingest: {history_ingest.get('status', 'unknown')} (configured: {history_ingest.get('configured', False)})")
          print(f"- Change archive: {changes_archive.get('status', 'unknown')} (configured: {changes_archive.get('configured', False)})")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: work/site/

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Verify artifact freshness
        id: fresh
        env:
          EXPECTED_SHA: ${{ needs.collect.outputs.source_sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          if [ "$actual_sha" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            {
              echo '## Pages deployment skipped'
              echo
              echo "Refresh artifact was built from ${EXPECTED_SHA}; default branch is now ${actual_sha}."
              echo 'A successor refresh will collect from the newer revision.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.fresh.outputs.current == 'true'
        uses: actions/deploy-pages@v4
