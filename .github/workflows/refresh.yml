name: Refresh Data

on:
  workflow_dispatch:
    inputs:
      cycle_seconds:
        description: Seconds until the next cycle; keep 1200 outside manual verification
        required: false
        default: '1200'

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      started_at: ${{ steps.cycle.outputs.started_at }}
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Record cycle start
        id: cycle
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          # A queued run may start after an earlier refresh advances main.
          # Always collect from the latest default-branch snapshot.
          ref: ${{ github.event.repository.default_branch }}
          # Code comes from Git; generated snapshots are deployed as artifacts.
          fetch-depth: 2

      - name: Record artifact source revision
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Run fetcher
        run: python app/fetcher.py
        env:
          PYTHONIOENCODING: utf-8
          TTMRANK_HISTORY_URL: ${{ secrets.TTMRANK_HISTORY_URL }}
          TTMRANK_HISTORY_TOKEN: ${{ secrets.TTMRANK_HISTORY_TOKEN }}

      - name: Validate generated data
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -v
          python -m json.tool app/data/v2/manifest.json >/dev/null

      - name: Install frontend dependencies
        run: npm ci

      - name: Run JavaScript unit tests
        run: npm run test:unit

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium smoke tests
        run: npm run test:e2e

      - name: Write refresh summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          manifest = json.loads(Path('app/data/v2/manifest.json').read_text(encoding='utf-8'))
          quality = json.loads(Path('app/data/v2/quality.json').read_text(encoding='utf-8'))
          history_ingest = manifest.get('history_ingest', {})
          print('## TTMRank refresh')
          print(f"- Games: {manifest['game_count']}")
          print(f"- Appearances: {manifest['appearance_count']}")
          print(f"- Quality warnings: {len(quality.get('issues', []))}")
          print(f"- Analysis JSON: {manifest['analysis_bytes']:,} bytes ({manifest['analysis_gzip_bytes']:,} gzip)")
          print(f"- Hourly history baselines: {'available' if manifest.get('history_available') else 'unavailable / graceful fallback'}")
          print(f"- Current history ingest: {history_ingest.get('status', 'unknown')} (configured: {history_ingest.get('configured', False)})")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload generated site
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check latest default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Verify artifact freshness
        id: fresh
        env:
          EXPECTED_SHA: ${{ needs.collect.outputs.source_sha }}
        run: |
          actual_sha=$(git rev-parse HEAD)
          if [ "$actual_sha" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            {
              echo '## Pages deployment skipped'
              echo
              echo "Refresh artifact was built from ${EXPECTED_SHA}; default branch is now ${actual_sha}."
              echo 'A successor refresh will collect from the newer revision.'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.fresh.outputs.current == 'true'
        uses: actions/deploy-pages@v4

  continue:
    needs: collect
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Continue refresh cycle
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CYCLE_STARTED_AT: ${{ needs.collect.outputs.started_at }}
          CYCLE_SECONDS: ${{ inputs.cycle_seconds || '1200' }}
        run: |
          cycle_started_at="${CYCLE_STARTED_AT:-$(date +%s)}"
          cycle_seconds="${CYCLE_SECONDS:-1200}"
          if ! [[ "$cycle_seconds" =~ ^[0-9]+$ ]] || [ "$cycle_seconds" -lt 60 ] || [ "$cycle_seconds" -gt 1200 ]; then
            cycle_seconds=1200
          fi
          next_cycle_at=$((cycle_started_at + cycle_seconds))
          now=$(date +%s)
          delay=$((next_cycle_at - now))
          if [ "$delay" -gt 0 ]; then
            echo "Waiting ${delay}s for the next 20-minute cycle"
            sleep "$delay"
          fi

          active_runs="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow refresh.yml --limit 20 --json databaseId,status --jq "[.[] | select(.databaseId != $GITHUB_RUN_ID and (.status == \"queued\" or .status == \"in_progress\"))] | length")"
          if [ "$active_runs" -eq 0 ]; then
            gh workflow run refresh.yml --repo "$GITHUB_REPOSITORY" --ref "$DEFAULT_BRANCH"
          else
            echo "Another refresh is already queued or running"
          fi
