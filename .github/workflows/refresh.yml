name: Refresh Data

on:
  workflow_dispatch:
    inputs:
      cycle_seconds:
        description: Seconds until the next cycle; keep 1200 outside manual verification
        required: false
        default: '1200'

permissions:
  actions: write
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Record cycle start
        id: cycle
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          # A queued run may start after an earlier refresh advances main.
          # Always collect from the latest default-branch snapshot.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fetcher
        run: python app/fetcher.py
        env:
          PYTHONIOENCODING: utf-8
          TTMRANK_HISTORY_URL: ${{ secrets.TTMRANK_HISTORY_URL }}
          TTMRANK_HISTORY_TOKEN: ${{ secrets.TTMRANK_HISTORY_TOKEN }}

      - name: Validate generated data
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -v
          python -m json.tool app/data/v2/manifest.json >/dev/null

      - name: Write refresh summary
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          manifest = json.loads(Path('app/data/v2/manifest.json').read_text(encoding='utf-8'))
          quality = json.loads(Path('app/data/v2/quality.json').read_text(encoding='utf-8'))
          print('## TTMRank refresh')
          print(f"- Games: {manifest['game_count']}")
          print(f"- Appearances: {manifest['appearance_count']}")
          print(f"- Quality warnings: {len(quality.get('issues', []))}")
          print(f"- Analysis JSON: {manifest['analysis_bytes']:,} bytes ({manifest['analysis_gzip_bytes']:,} gzip)")
          print(f"- Hourly history: {'available' if manifest.get('history_available') else 'unavailable / graceful fallback'}")
          PY

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/data/meta.json app/data/rankings*.json app/data/v2/
          if git diff --cached --quiet; then
            echo 'No data changes'
            echo 'changed=false' >> "$GITHUB_OUTPUT"
          else
            git commit -m 'Auto refresh data'
            git push
            echo 'changed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy refreshed data
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref "$DEFAULT_BRANCH"

      - name: Continue refresh cycle
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CYCLE_STARTED_AT: ${{ steps.cycle.outputs.started_at }}
          CYCLE_SECONDS: ${{ inputs.cycle_seconds || '1200' }}
        run: |
          cycle_started_at="${CYCLE_STARTED_AT:-$(date +%s)}"
          cycle_seconds="${CYCLE_SECONDS:-1200}"
          if ! [[ "$cycle_seconds" =~ ^[0-9]+$ ]] || [ "$cycle_seconds" -lt 60 ] || [ "$cycle_seconds" -gt 1200 ]; then
            cycle_seconds=1200
          fi
          next_cycle_at=$((cycle_started_at + cycle_seconds))
          now=$(date +%s)
          delay=$((next_cycle_at - now))
          if [ "$delay" -gt 0 ]; then
            echo "Waiting ${delay}s for the next 20-minute cycle"
            sleep "$delay"
          fi

          active_runs="$(gh run list --workflow refresh.yml --limit 20 --json databaseId,status --jq "[.[] | select(.databaseId != $GITHUB_RUN_ID and (.status == \"queued\" or .status == \"in_progress\"))] | length")"
          if [ "$active_runs" -eq 0 ]; then
            gh workflow run refresh.yml --repo "$GITHUB_REPOSITORY" --ref "$DEFAULT_BRANCH"
          else
            echo "Another refresh is already queued or running"
          fi
