<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="TTMRank 原始排行榜：完整浏览 TapTap Android 与 iOS 多类榜单。">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>原始排行榜 · TTMRank</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/style.css?v=22">
  <script src="js/app.js?v=22" defer></script>
</head>
<body data-page="rankings">
  <header class="intel-header">
    <div class="container intel-header-inner">
      <a class="intel-brand" href="index.html" aria-label="TTMRank 情报首页">
        <span class="intel-brand-mark" aria-hidden="true">T</span>
        <span class="intel-brand-copy"><strong>TTMRank</strong><small>游戏变化情报</small></span>
      </a>
      <nav class="intel-nav" aria-label="主要导航">
        <a href="index.html">情报</a>
        <a href="universe.html">游戏地图</a>
        <a href="analysis.html?scope=made">游戏分析</a>
        <a href="rankings.html" aria-current="page">原始排行</a>
        <a class="intel-nav-external" href="https://github.com/KingSystemHaiGo/TTMRank" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
      <button class="icon-action rank-refresh" id="btnRefresh" type="button" title="重新读取本地数据" aria-label="重新读取本地数据" hidden>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
  </header>

  <main class="rank-container">
    <section class="rank-intro" aria-labelledby="rankingTitle">
      <div>
        <h1 id="rankingTitle">原始排行榜</h1>
        <p>按平台与榜单查看完整原始顺序；全站范围仅作核对和参考。</p>
      </div>
      <div class="rank-freshness"><span>最近更新</span><strong id="updateTime">正在读取…</strong><small>数据来源 TapTap 排行榜</small></div>
    </section>

    <section class="rank-controls" aria-label="排行榜控制">
      <div class="plat-bar" id="platBar" role="group" aria-label="平台"></div>
      <div class="tabs-wrap"><div class="tabs" id="tabs" role="group" aria-label="榜单"></div></div>
    </section>

    <div id="main"></div>
    <noscript><div class="state-message">此页面需要 JavaScript 才能读取排行榜数据。</div></noscript>
  </main>

  <footer class="rank-footer rank-container"><span>数据来源 TapTap 排行榜 · 非 TapTap 官方产品</span><a href="https://www.taptap.cn/top" target="_blank" rel="noreferrer">打开 TapTap 排行榜</a></footer>

  <dialog class="game-modal-bg" id="gameModalBg" aria-label="游戏信息">
    <aside class="game-modal" id="gameModal"></aside>
  </dialog>
</body>
</html>
