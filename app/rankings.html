<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="TTMRank 原始排行榜：完整浏览 TapTap Android 与 iOS 多类榜单。">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>原始排行榜 · TTMRank</title>
  <link rel="stylesheet" href="css/style.css?v=20">
  <script src="js/app.js?v=20" defer></script>
</head>
<body>
  <header class="rank-header">
    <div class="rank-container header-inner">
      <a class="rank-brand" href="index.html" aria-label="返回 TTMRank 首页">
        <span class="rank-brand-mark" aria-hidden="true">T</span>
        <span><strong>TTMRank</strong><small>原始排行终端</small></span>
      </a>
      <nav class="rank-nav" aria-label="主要导航">
        <a href="analysis.html?scope=made">游戏分析</a>
        <button class="icon-button" id="btnRefresh" title="刷新数据" aria-label="刷新数据">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
        <button class="icon-button" id="btnTheme" title="切换主题" aria-label="切换主题">◐</button>
      </nav>
    </div>
  </header>

  <main class="rank-container">
    <section class="rank-intro" aria-labelledby="rankingTitle">
      <div>
        <h1 id="rankingTitle">原始排行榜</h1>
        <p>按平台和榜单浏览游戏，排名、评分、热度与标签保持原始口径。</p>
      </div>
      <div class="rank-freshness"><span>最近更新</span><strong id="updateTime">正在读取…</strong><small>数据来源 TapTap 排行榜</small></div>
    </section>

    <section class="rank-controls" aria-label="排行榜控制">
      <div class="plat-bar" id="platBar" role="group" aria-label="平台"></div>
      <div class="tabs-wrap"><div class="tabs" id="tabs" role="group" aria-label="榜单"></div></div>
    </section>

    <div id="main"></div>
    <noscript><div class="state-message">此页面需要 JavaScript 才能读取排行榜数据。</div></noscript>
  </main>

  <footer class="rank-footer rank-container"><span>仅供学习研究 · 非 TapTap 官方产品</span><a href="https://www.taptap.cn/top" target="_blank" rel="noreferrer">前往 TapTap 排行榜 ↗</a></footer>

  <dialog class="game-modal-bg" id="gameModalBg" aria-label="游戏详情">
    <aside class="game-modal" id="gameModal"></aside>
  </dialog>
</body>
</html>
