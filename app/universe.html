<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="TTMRank 游戏地图：按类型与热度浏览 TapTap制造游戏，并查看评分和榜单覆盖。">
  <title>游戏地图 · TTMRank</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/universe.css?v=2">
  <script type="module" src="js/dist/universe-app.js?v=1"></script>
</head>
<body data-page="universe">
  <header class="intel-header">
    <div class="reading-container intel-header-inner">
      <a class="intel-brand" href="index.html" aria-label="TTMRank 情报首页">
        <span class="intel-brand-mark" aria-hidden="true">T</span>
        <span class="intel-brand-copy"><strong>TTMRank</strong><small>游戏变化情报</small></span>
      </a>
      <nav class="intel-nav" aria-label="主要导航">
        <a href="index.html">情报</a>
        <a href="universe.html" aria-current="page">游戏地图</a>
        <a href="analysis.html">游戏分析</a>
        <a href="rankings.html">原始排行</a>
        <a class="intel-nav-external" href="https://github.com/KingSystemHaiGo/TTMRank" target="_blank" rel="noreferrer">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="universe-main">
    <section class="reading-container universe-intro" aria-labelledby="universeTitle">
      <div>
        <h1 id="universeTitle">TapTap制造游戏地图</h1>
        <p>横向比较热度，纵向区分类型；直接找到值得继续观察的游戏。</p>
      </div>
      <div class="universe-update"><span>数据观察时间</span><strong id="universeFreshness" role="status">正在读取</strong></div>
    </section>

    <section class="universe-workspace" aria-label="TapTap制造游戏地图">
      <div class="universe-stage-column">
        <div class="universe-toolbar">
          <label><span class="sr-only">搜索游戏或标签</span><input id="universeQuery" type="search" placeholder="搜索游戏或标签" autocomplete="off"></label>
          <label><span class="sr-only">按类型筛选</span><select id="universeCluster"><option value="">全部类型</option></select></label>
          <button id="universeClear" type="button" hidden>清除筛选</button>
          <span class="universe-toolbar-spacer"></span>
          <a id="universeModeLink" href="universe.html?render=webgl">启用增强地图</a>
        </div>

        <div id="universeStage" class="universe-stage" data-render-mode="loading">
          <div class="universe-axis" aria-hidden="true"><span>低热度</span><i></i><span>高热度</span></div>
          <canvas id="universeCanvas" hidden aria-hidden="true"></canvas>
          <div id="universePlot" class="universe-plot" role="group" aria-label="按类型与热度排列的游戏标记"></div>
          <div class="universe-stage-state"><span id="universeStatus" role="status" aria-live="polite">正在读取游戏数据</span></div>
        </div>

        <div class="universe-key" aria-label="地图读法">
          <span><i class="key-position"></i>横向顺序＝对数热度</span>
          <span><i class="key-score">9.2</i>数字＝评分</span>
          <span><i class="key-cover">3</i>右上角＝榜单覆盖</span>
        </div>
        <p class="universe-reading-note">地图只表达当前类型与热度层级；同一类型内会将相近标记上下错开，避免互相遮挡。精确数据始终显示在详情和游戏索引中。</p>
      </div>

      <aside class="universe-side" aria-label="游戏索引与选中游戏">
        <section class="universe-detail-shell">
          <div id="universeDetailEmpty" class="universe-detail-empty"><strong>选择一款游戏</strong><p>点击地图标记或游戏名称，查看精确数据。</p></div>
          <article id="universeDetail" hidden></article>
        </section>
        <section class="universe-index" aria-labelledby="universeIndexTitle">
          <div class="universe-index-head"><h2 id="universeIndexTitle">游戏索引</h2><span id="universeCount">—</span></div>
          <div id="universeList" class="universe-list" aria-live="polite"></div>
        </section>
      </aside>
    </section>
  </main>

  <footer class="reading-container universe-footer"><span>数据来源 TapTap 排行榜 · 非 TapTap 官方产品</span><a href="analysis.html">打开游戏分析</a></footer>
</body>
</html>
